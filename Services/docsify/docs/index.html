<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Documentation MLOps - Automatic-Fraud-Detection</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="description" content="Documentation MLOps complète avec diagrammes Mermaid">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  <style>
    .mermaid {
      width: 800px !important;
      height: 600px !important;
      max-width: 800px !important;
      max-height: 600px !important;
    }
    .mermaid svg {
      width: 800px !important;
      height: 600px !important;
      max-width: 800px !important;
      max-height: 600px !important;
    }
    
    /* Dark mode (default) */
    body {
      background-color: #1a1a2e;
      color: #eaeaea;
      transition: background-color 0.3s, color 0.3s;
    }
    .sidebar {
      background-color: #16213e;
      transition: background-color 0.3s;
    }
    .sidebar-nav > ul > li > a {
      color: #eaeaea;
      transition: color 0.3s;
    }
    .mermaid .nodeLabel {
      color: #16213e!important;
    }
    .mermaid .cluster {
      color: #1e293b!important;
    }
    
    /* Light mode */
    body.light-mode {
      background-color: #ffffff;
      color: #1a1a2e;
    }
    body.light-mode .sidebar {
      background-color: #f5f5f5;
    }
    body.light-mode .sidebar-nav > ul > li > a {
      color: #1a1a2e;
    }
    
    /* Theme toggle button in header */
    .theme-toggle {
      position: fixed;
      top: 10px;
      right: 50px;
      z-index: 1000;
      background: rgba(255, 255, 255, 0.1);
      border: none;
      border-radius: 8px;
      width: 36px;
      height: 36px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      transition: background 0.3s;
    }
    .theme-toggle:hover {
      background: rgba(255, 255, 255, 0.2);
    }
    body.light-mode .theme-toggle {
      background: rgba(0, 0, 0, 0.1);
    }
    body.light-mode .theme-toggle:hover {
      background: rgba(0, 0, 0, 0.15);
    }
  </style>
</head>
<body>
  <button class="theme-toggle" id="theme-toggle" title="Toggle theme">🌙</button>
  <div id="app"></div>
  <script>
    // Theme toggle functionality
    let isDarkMode = true;
    
    const themeToggle = document.getElementById('theme-toggle');
    if (themeToggle) {
      themeToggle.addEventListener('click', toggleTheme);
    }
    
    function toggleTheme() {
      isDarkMode = !isDarkMode;
      document.body.classList.toggle('light-mode', !isDarkMode);
      const themeToggle = document.getElementById('theme-toggle');
      if (themeToggle) {
        themeToggle.textContent = isDarkMode ? '🌙' : '☀️';
      }
      
      // Reinitialize mermaid with new theme
      if (window.mermaid) {
        const theme = isDarkMode ? 'dark' : 'default';
        const themeVars = isDarkMode ? {
          primaryColor: '#1e3a5f',
          primaryTextColor: '#ffffff',
          primaryBorderColor: '#4a90d9',
          lineColor: '#8b9dc3',
          secondaryColor: '#2d4a6f',
          tertiaryColor: '#3d5a7f',
          background: '#0f172a',
          mainBkg: '#1e3a5f',
          nodeBorder: '#4a90d9',
          clusterBkg: '#1e293b',
          clusterBorder: '#334155',
          titleColor: '#f1f5f9',
          edgeLabelBackground: '#1e3a5f',
          actorBkg: '#1e3a5f',
          actorBorder: '#4a90d9',
          actorTextColor: '#ffffff',
          actorLineColor: '#8b9dc3',
          signalColor: '#8b9dc3',
          signalTextColor: '#f1f5f9',
          labelBoxBkgColor: '#1e293b',
          labelTextColor: '#f1f5f9',
          loopTextColor: '#f1f5f9',
          noteBorderColor: '#334155',
          noteBkgColor: '#1e293b',
          noteTextColor: '#f1f5f9',
          activationBorderColor: '#334155',
          activationBkgColor: '#1e293b',
          sequenceNumberColor: '#f1f5f9'
        } : {
          primaryColor: '#e1f5ff',
          primaryTextColor: '#1e293b',
          primaryBorderColor: '#0ea5e9',
          lineColor: '#64748b',
          secondaryColor: '#fff4e1',
          tertiaryColor: '#fce4ec',
          background: '#ffffff',
          mainBkg: '#e1f5ff',
          nodeBorder: '#0ea5e9',
          clusterBkg: '#f1f5f9',
          clusterBorder: '#cbd5e1',
          titleColor: '#1e293b',
          edgeLabelBackground: '#e1f5ff',
          actorBkg: '#e1f5ff',
          actorBorder: '#0ea5e9',
          actorTextColor: '#1e293b',
          actorLineColor: '#64748b',
          signalColor: '#64748b',
          signalTextColor: '#1e293b',
          labelBoxBkgColor: '#f1f5f9',
          labelTextColor: '#1e293b',
          loopTextColor: '#1e293b',
          noteBorderColor: '#cbd5e1',
          noteBkgColor: '#f1f5f9',
          noteTextColor: '#1e293b',
          activationBorderColor: '#cbd5e1',
          activationBkgColor: '#f1f5f9',
          sequenceNumberColor: '#1e293b'
        };
        
        mermaid.initialize({ 
          startOnLoad: true, 
          theme: theme,
          themeVariables: themeVars,
          flowchart: {
            useMaxWidth: false,
            htmlLabels: true,
            curve: 'basis'
          }
        });
        mermaid.init(undefined, document.querySelectorAll('.mermaid'));
      }
    }
    
    window.$docsify = {
      name: 'Documentation MLOps',
      repo: '',
      loadSidebar: true,
      subMaxLevel: 2,
      plugins: [
        // Initialize mermaid
        function(hook, vm) {
          hook.doneEach(function() {
            if (window.mermaid) {
              const theme = isDarkMode ? 'dark' : 'default';
              const themeVars = isDarkMode ? {
                primaryColor: '#1e3a5f',
                primaryTextColor: '#ffffff',
                primaryBorderColor: '#4a90d9',
                lineColor: '#8b9dc3',
                secondaryColor: '#2d4a6f',
                tertiaryColor: '#3d5a7f',
                background: '#0f172a',
                mainBkg: '#1e3a5f',
                nodeBorder: '#4a90d9',
                clusterBkg: '#1e293b',
                clusterBorder: '#334155',
                titleColor: '#f1f5f9',
                edgeLabelBackground: '#1e3a5f',
                actorBkg: '#1e3a5f',
                actorBorder: '#4a90d9',
                actorTextColor: '#ffffff',
                actorLineColor: '#8b9dc3',
                signalColor: '#8b9dc3',
                signalTextColor: '#f1f5f9',
                labelBoxBkgColor: '#1e293b',
                labelTextColor: '#f1f5f9',
                loopTextColor: '#f1f5f9',
                noteBorderColor: '#334155',
                noteBkgColor: '#1e293b',
                noteTextColor: '#f1f5f9',
                activationBorderColor: '#334155',
                activationBkgColor: '#1e293b',
                sequenceNumberColor: '#f1f5f9'
              } : {
                primaryColor: '#e1f5ff',
                primaryTextColor: '#1e293b',
                primaryBorderColor: '#0ea5e9',
                lineColor: '#64748b',
                secondaryColor: '#fff4e1',
                tertiaryColor: '#fce4ec',
                background: '#ffffff',
                mainBkg: '#e1f5ff',
                nodeBorder: '#0ea5e9',
                clusterBkg: '#f1f5f9',
                clusterBorder: '#cbd5e1',
                titleColor: '#1e293b',
                edgeLabelBackground: '#e1f5ff',
                actorBkg: '#e1f5ff',
                actorBorder: '#0ea5e9',
                actorTextColor: '#1e293b',
                actorLineColor: '#64748b',
                signalColor: '#64748b',
                signalTextColor: '#1e293b',
                labelBoxBkgColor: '#f1f5f9',
                labelTextColor: '#1e293b',
                loopTextColor: '#1e293b',
                noteBorderColor: '#cbd5e1',
                noteBkgColor: '#f1f5f9',
                noteTextColor: '#1e293b',
                activationBorderColor: '#cbd5e1',
                activationBkgColor: '#f1f5f9',
                sequenceNumberColor: '#1e293b'
              };
              mermaid.initialize({ 
                startOnLoad: true, 
                theme: theme,
                themeVariables: themeVars,
                flowchart: {
                  useMaxWidth: false,
                  htmlLabels: true,
                  curve: 'basis'
                }
              });
              mermaid.init(undefined, document.querySelectorAll('.mermaid'));
            }
          });
        }
      ]
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4"></script>
  <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-mermaid@1.0.0/dist/docsify-mermaid.min.js"></script>
</body>
</html>
