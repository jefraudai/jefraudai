# Configuration du projet MLOps Enedis

# Chemins données
data:
  raw_path: "data/raw/"
  processed_path: "data/processed/"

# Paramètres modèle
model:
  test_size: 0.2
  random_state: 42
  model_type: "random_forest"
  
# Paramètres entraînement
training:
  epochs: 100
  batch_size: 32
  learning_rate: 0.001

# MLflow
mlflow:
  tracking_uri: "https://jenedai-mlflow.hf.space/"
  experiment_name: "enedis_project"
  
# Evidently AI
monitoring:
  reference_data_path: "data/processed/reference.csv"
  dashboard_path: "outputs/evidently_dashboard.html"
  report_path: "outputs/evidently_report.html"
