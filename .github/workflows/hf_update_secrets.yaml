name: 0 - Infra - Update HF Space Secrets

on:
  push:
    branches:
      - main
    paths:
      - '.github/scripts/hf_update_secrets.py'
      - '.github/scripts/config.yaml'
  workflow_dispatch:

jobs:
  update_secrets:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install huggingface_hub python-dotenv requests
      
      - name: Update secrets in spaces
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_DEFAULT_REGION }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          AWS_ENDPOINT_URL: ${{ secrets.AWS_ENDPOINT_URL }}
          AWS_BUCKET: ${{ secrets.AWS_BUCKET }}
          MLFLOW_POSTGRES_URI: ${{ secrets.MLFLOW_POSTGRES_URI }}
          MLFLOW_S3_ENDPOINT_URL: ${{ secrets.MLFLOW_S3_ENDPOINT_URL }}
          DB_TYPE: ${{ secrets.DB_TYPE }}
          DB_POSTGRESDB_USER: ${{ secrets.DB_POSTGRESDB_USER }}
          DB_POSTGRESDB_PASSWORD: ${{ secrets.DB_POSTGRESDB_PASSWORD }}
          DB_POSTGRESDB_HOST: ${{ secrets.DB_POSTGRESDB_HOST }}
          DB_POSTGRESDB_PORT: ${{ secrets.DB_POSTGRESDB_PORT }}
          DB_POSTGRESDB_DATABASE: ${{ secrets.DB_POSTGRESDB_DATABASE }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          GH_REPO: ${{ secrets.GH_REPO }}
          GH_BRANCH: ${{ secrets.GH_BRANCH }}
          KAFKA_PASSWORD: ${{ secrets.KAFKA_PASSWORD }}
          KAFKA_BOOTSTRAP_SERVERS: ${{ secrets.KAFKA_BOOTSTRAP_SERVERS }}
          KAFKA_USERNAME: ${{ secrets.KAFKA_USERNAME }}
          POSTGRES_URI: ${{ secrets.POSTGRES_URI }}
          MLFLOW_HF_TOKEN: ${{ secrets.MLFLOW_HF_TOKEN }}

        run: |
          python .github/scripts/hf_update_secrets.py
